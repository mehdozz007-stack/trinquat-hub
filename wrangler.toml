name = "trinquat-compagnie"
main = ".output/server/index.mjs"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "trinquat_newsletter"
database_id = "local"  # DEV: Use local D1 emulator. PROD: Replace with actual D1 ID
migrations_dir = "migrations"

[env.production]
vars = { ENVIRONMENT = "production" }
[[env.production.d1_databases]]
binding = "DB"
database_name = "trinquat_newsletter"
database_id = "REPLACE_WITH_ACTUAL_D1_ID"

# Secrets configuration (for production use):
# wrangler secret put JWT_SECRET --env production
# wrangler secret put ADMIN_BOOTSTRAP_TOKEN --env production
