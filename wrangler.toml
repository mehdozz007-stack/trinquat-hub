name = "trinquat-compagnie"
main = "src/worker.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "trinquat_newsletter"
database_name = "trinquat_newsletter"
database_id = "db2895c7-7a16-4bf3-90b6-72485f80ea94"
migrations_dir = "migrations"

# Bucket R2 pour images (événements + actualités)
# Créez le bucket : `wrangler r2 bucket create trinquat-media`
# Activez l'accès public dans le dashboard puis renseignez MEDIA_PUBLIC_URL ci-dessous.
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "trinquat-media"

[vars]
MEDIA_PUBLIC_URL = "https://pub-REPLACE_ME.r2.dev"

[env.production]
vars = { ENVIRONMENT = "production" }
[[env.production.d1_databases]]
binding = "DB"
database_name = "trinquat_newsletter"
database_id = "db2895c7-7a16-4bf3-90b6-72485f80ea94"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "trinquat-media"

# Secrets configuration (for production use):
# wrangler secret put JWT_SECRET --env production
# wrangler secret put ADMIN_BOOTSTRAP_TOKEN --env production
